on: push

name: 🚀 Deploy website on push

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v6
        
      - name: 📂 Sync files - TEST DRY RUN
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ftp-lequaiantique.alwaysdata.net
          username: lequaiantique
          password: ${{ secrets.ftp_password }}
          protocol: ftps
          port: 21
          server-dir: /www/
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/scss/**
            **/sass/**
